name: Update Instances Type

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python .github/scripts/generate_instances.py
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: Update Instances.luau type definitions"
          file_pattern: "src/Type/Instances.luau"
